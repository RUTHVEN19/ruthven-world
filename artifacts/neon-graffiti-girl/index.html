<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>NEON GRAFFITI GIRL — The Manga Machine</title>
<style>
  :root{
    --pink:#ff2d78; --pink-soft:#ff7ab0; --cyan:#00d4ff; --green:#39ff14;
    --gold:#ffd700; --cream:#ffeaf3;
    --body:#33163f; --body2:#1e0c28; --ink:#0a0410;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--ink)}
  body{
    display:flex;align-items:center;justify-content:center;
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;color:#fff;
    -webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;padding:1.5vmin;
  }
  #room{position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(ellipse at 50% 40%,rgba(255,45,120,.26),transparent 60%),
               radial-gradient(ellipse at 15% 90%,rgba(255,122,176,.13),transparent 55%)}

  /* ── CABINET ─────────────────────────── */
  #cab{
    position:relative;z-index:2;width:min(560px,96vw);max-height:97vh;
    display:flex;flex-direction:column;
    background:
      linear-gradient(180deg,rgba(255,255,255,.10),transparent 16%),
      linear-gradient(180deg,#43204f,#2a1136 58%,#1a0a24);
    border:4px solid var(--pink);
    border-radius:56px 56px 34px 34px;
    padding:13px 13px 11px;
    animation:bob 6s ease-in-out infinite, neonCase 2.8s ease-in-out infinite;
  }
  /* casing stays BRIGHT PINK — the neon just breathes, it never changes colour */
  @keyframes neonCase{
    0%,100%{box-shadow:0 0 22px rgba(255,45,120,.62),0 0 52px rgba(255,45,120,.32),
                       0 26px 70px rgba(0,0,0,.8),inset 0 2px 0 rgba(255,255,255,.18)}
    50%    {box-shadow:0 0 34px rgba(255,45,120,.92),0 0 78px rgba(255,45,120,.55),
                       0 26px 70px rgba(0,0,0,.8),inset 0 2px 0 rgba(255,255,255,.18)}
  }
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-.4deg)}50%{transform:translateY(-8px) rotate(.4deg)}}

  /* glossy anime highlight across the top of the casing */
  #gloss{position:absolute;left:6%;right:6%;top:5px;height:26px;border-radius:50%;
    background:linear-gradient(180deg,rgba(255,255,255,.30),transparent);
    filter:blur(5px);pointer-events:none;z-index:3}

  /* kira-kira sparkles */
  .spark{position:absolute;z-index:4;pointer-events:none;color:#fff;
    font-size:16px;text-shadow:0 0 10px #fff,0 0 20px var(--pink);animation:kira 2.4s infinite}
  .spark.s1{top:-10px;left:12%;animation-delay:0s}
  .spark.s2{top:16%;right:-12px;animation-delay:.5s}
  .spark.s3{bottom:14%;left:-12px;animation-delay:1s;color:#ffe6f2}
  .spark.s4{bottom:-8px;right:16%;animation-delay:1.6s}
  @keyframes kira{0%,100%{opacity:0;transform:scale(.4) rotate(0)}
                  50%{opacity:1;transform:scale(1.15) rotate(90deg)}}

  /* marquee with little bulbs */
  #marquee{
    position:relative;text-align:center;padding:12px 14px 11px;flex:none;
    border-radius:40px 40px 18px 18px;
    background:linear-gradient(180deg,rgba(255,122,176,.30),rgba(255,45,120,.06));
    border:2px solid rgba(255,122,176,.5);
    box-shadow:inset 0 0 26px rgba(255,45,120,.24);
  }
  .bulbs{position:absolute;top:5px;left:12px;right:12px;display:flex;justify-content:space-between;pointer-events:none}
  .bulbs i{width:5px;height:5px;border-radius:50%;background:var(--cream);
    box-shadow:0 0 7px var(--cream);animation:twinkle 1.8s infinite}
  .bulbs i:nth-child(2n){animation-delay:.3s}.bulbs i:nth-child(3n){animation-delay:.7s}
  @keyframes twinkle{0%,100%{opacity:1}50%{opacity:.28}}
  #kanji{margin-top:5px;font-family:serif;font-weight:900;letter-spacing:.10em;
    font-size:clamp(20px,5vmin,30px);color:var(--pink);
    text-shadow:0 0 14px var(--pink),0 0 38px rgba(255,45,120,.7);animation:buzz 5s infinite}
  @keyframes buzz{0%,92%,100%{opacity:1}94%{opacity:.55}96%{opacity:1}97%{opacity:.72}}
  #sub{margin-top:3px;font-size:clamp(8.5px,2vmin,12px);letter-spacing:.32em;color:rgba(255,255,255,.88)}

  /* screen */
  #bezel{margin:11px 3px 0;padding:10px;border-radius:30px;flex:none;
    background:linear-gradient(180deg,#3d2350,#22132e);
    border:2px solid rgba(255,255,255,.10);box-shadow:inset 0 3px 12px rgba(0,0,0,.9)}
  #screen{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;border-radius:22px;
    background:#000;border:2px solid #1a0f24;box-shadow:inset 0 0 38px rgba(0,0,0,.95)}
  .lyr{position:absolute;inset:0;opacity:0;transition:opacity .45s ease}
  .lyr.on{opacity:1}
  .lyr img,.lyr video{width:100%;height:100%;object-fit:cover;display:block}
  /* the printout reveal — manga prints out of the machine */
  #l-print{position:absolute;inset:0;opacity:0;z-index:3}
  #l-print.on{opacity:1}
  #l-print img{width:100%;height:100%;object-fit:cover;display:block}
  #l-print.go img{animation:printOut 2.2s cubic-bezier(.22,.61,.36,1) forwards;transform-origin:top center}
  @keyframes printOut{
    0%{clip-path:inset(0 0 100% 0);transform:translateY(-8%);filter:brightness(2) contrast(.5)}
    15%{clip-path:inset(0 0 85% 0);transform:translateY(-5%);filter:brightness(1.5) contrast(.7)}
    40%{clip-path:inset(0 0 50% 0);transform:translateY(-3%);filter:brightness(1.2) contrast(.85)}
    100%{clip-path:inset(0 0 0 0);transform:translateY(0);filter:none}
  }
  #edge{position:absolute;left:0;right:0;height:3px;z-index:6;opacity:0;pointer-events:none;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.85),transparent);
    box-shadow:0 0 12px rgba(255,255,255,.6),0 2px 20px rgba(255,45,120,.35)}
  #edge.go{animation:printEdge 2.2s cubic-bezier(.22,.61,.36,1) forwards}
  @keyframes printEdge{0%{top:0;opacity:1}85%{opacity:1}100%{top:100%;opacity:0}}
  #flash{position:absolute;inset:0;background:#fff;opacity:0;z-index:7;pointer-events:none}
  #flash.go{animation:bigFlash .6s ease-out forwards}
  @keyframes bigFlash{0%{opacity:1}100%{opacity:0}}
  #scan{position:absolute;inset:0;pointer-events:none;opacity:.20;z-index:8;
    background:repeating-linear-gradient(to bottom,rgba(255,255,255,.12) 0 1px,transparent 1px 3px);
    mix-blend-mode:overlay}
  #glare{position:absolute;inset:0;pointer-events:none;z-index:8;
    background:linear-gradient(118deg,rgba(255,255,255,.12) 0%,transparent 34%)}
  #vig{position:absolute;inset:0;pointer-events:none;z-index:8;box-shadow:inset 0 0 48px rgba(0,0,0,.82)}
  /* in-screen captions, like the site */
  #cap{position:absolute;top:9px;left:10px;z-index:9;display:flex;flex-direction:column;gap:1px}
  #capk{font-family:serif;font-weight:700;font-size:clamp(11px,2.4vmin,15px);
    color:var(--pink);text-shadow:0 0 10px currentColor}
  #cape{font-size:clamp(6.5px,1.5vmin,8.5px);letter-spacing:.22em;color:rgba(255,255,255,.72)}
  #neon{position:absolute;left:0;right:0;bottom:0;z-index:9;text-align:center;padding:9px 8px;
    font-family:Impact,"Arial Black",sans-serif;font-weight:900;text-transform:uppercase;
    font-size:clamp(14px,3.2vmin,22px);letter-spacing:.12em;color:var(--pink);
    text-shadow:0 0 7px currentColor,0 0 20px currentColor,0 0 40px currentColor;
    background:linear-gradient(to top,rgba(0,0,0,.8),rgba(0,0,0,.35) 60%,transparent);opacity:0}
  #neon.on{opacity:1;animation:flick .9s ease-out}
  @keyframes flick{0%{opacity:0}20%{opacity:1}25%{opacity:.3}30%{opacity:1}35%{opacity:.6}40%{opacity:1}100%{opacity:1}}

  /* the three — porcelain / manga / transformation */
  #rewards{display:none;gap:7px;margin:10px 3px 0;flex:none}
  #rewards.on{display:flex}
  .rw{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:7px 6px;
    border-radius:20px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.13);
    opacity:0;animation:pop .6s cubic-bezier(.34,1.56,.64,1) both}
  .rw:nth-child(1){animation-delay:.2s}.rw:nth-child(2){animation-delay:.5s}.rw:nth-child(3){animation-delay:.8s}
  @keyframes pop{0%{opacity:0;transform:scale(.5) translateY(10px)}100%{opacity:1;transform:scale(1) translateY(0)}}
  .rw-img{width:100%;aspect-ratio:16/9;overflow:hidden;border-radius:14px;background:#0a0a0a;
    border:1px solid rgba(255,255,255,.12)}
  .rw-img img,.rw-img video{width:100%;height:100%;object-fit:cover;display:block}
  .rw-k{font-family:serif;font-weight:700;font-size:clamp(10px,2.1vmin,13px);text-shadow:0 0 8px currentColor}
  .rw-e{font-size:clamp(5.5px,1.25vmin,7.5px);letter-spacing:.18em;color:rgba(255,255,255,.62)}

  /* status + plate */
  #status{margin:9px 3px 0;padding:8px 14px;border-radius:22px;flex:none;
    display:flex;align-items:center;gap:9px;background:rgba(0,0,0,.42);
    border:1.5px solid rgba(255,255,255,.09);font-size:clamp(8px,1.9vmin,11px);letter-spacing:.22em}
  #led{width:8px;height:8px;border-radius:50%;flex:none;background:var(--green);
    box-shadow:0 0 8px var(--green);animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  #stext{flex:1;text-align:center;color:var(--pink);text-shadow:0 0 9px currentColor}
  body[data-state="manga"] #stext{color:var(--cyan)}
  body[data-state="transforming"] #stext,body[data-state="loading"] #stext{color:#fff}
  #plate{margin:9px 3px 0;text-align:center;padding:8px 12px;border-radius:22px;flex:none;
    background:linear-gradient(180deg,rgba(255,215,0,.13),transparent);
    border:1.5px solid rgba(255,215,0,.3)}
  #pname{font-size:clamp(11px,2.5vmin,15px);font-weight:700;letter-spacing:.2em}
  #partist{margin-top:2px;font-size:clamp(7px,1.6vmin,9px);letter-spacing:.24em;color:rgba(255,215,0,.8)}

  /* deck */
  #deck{margin:10px 3px 0;padding:11px 13px;border-radius:30px;flex:none;
    background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(0,0,0,.30));
    border:1.5px solid rgba(255,255,255,.11);display:flex;align-items:center;gap:12px}
  #lever{display:flex;align-items:center;gap:12px;flex:1;cursor:pointer;
    background:rgba(60,10,50,.6);border:2.5px solid var(--pink);border-radius:999px;
    padding:9px 14px;transition:all .25s;box-shadow:0 0 16px rgba(255,45,120,.22)}
  #lever:hover{box-shadow:0 0 34px rgba(255,45,120,.45);transform:scale(1.03)}
  #lever:hover #knob{transform:translateX(-50%) translateY(10px)}
  #lever[disabled]{opacity:.34;pointer-events:none}
  #track{position:relative;width:28px;height:46px;flex:none;border-radius:15px;
    background:linear-gradient(180deg,rgba(255,45,120,.12),rgba(255,45,120,.34));
    border:2px solid rgba(255,122,176,.5)}
  #knob{position:absolute;top:3px;left:50%;transform:translateX(-50%);
    width:21px;height:21px;border-radius:50%;
    background:radial-gradient(circle at 34% 28%,#fff,var(--pink-soft) 45%,var(--pink));
    box-shadow:0 0 13px var(--pink),inset 0 -2px 4px rgba(0,0,0,.3);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
  #knob.down{transform:translateX(-50%) translateY(21px)}
  #tglow{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:7px;height:7px;
    border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:pulse 1.5s infinite}
  #ltxt{flex:1;text-align:center;display:flex;flex-direction:column;gap:2px}
  #lk{font-size:clamp(13px,2.9vmin,18px);letter-spacing:.2em;color:var(--pink);text-shadow:0 0 11px var(--pink)}
  #le{font-size:clamp(7px,1.6vmin,9.5px);letter-spacing:.22em;color:rgba(255,255,255,.82)}
  #snd{width:38px;height:38px;flex:none;border-radius:50%;cursor:pointer;font-size:14px;color:#fff;
    background:rgba(0,0,0,.45);border:2px solid rgba(255,255,255,.22);transition:all .25s}
  #snd:hover{border-color:var(--pink);color:var(--pink);transform:scale(1.08)}

  /* base + feet */
  #base{margin:9px 5px 0;display:flex;align-items:center;justify-content:space-between;gap:8px;flex:none}
  #grille{display:flex;gap:4px}
  #grille i{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.18)}
  #coin{width:30px;height:7px;border-radius:4px;background:rgba(0,0,0,.6);border:1.5px solid rgba(255,255,255,.2)}
  #edn{font-size:clamp(6.5px,1.4vmin,8.5px);letter-spacing:.2em;color:rgba(255,255,255,.34)}
  #feet{display:flex;justify-content:space-between;padding:0 22px;margin-top:2px}
  #feet i{width:38px;height:7px;border-radius:0 0 8px 8px;background:rgba(0,0,0,.55)}

  /* at the reveal the three cards need the room — the name is already on screen */
  #rewards.on ~ #plate{display:none}
  @media (max-height:680px){#plate{display:none}#bezel{margin-top:8px}}
  @media (max-height:560px){#base,#feet{display:none}}
</style>
</head>
<body data-state="porcelain">

<div id="room"></div>

<div id="cab">
  <div id="gloss"></div>
  <span class="spark s1">✦</span><span class="spark s2">✧</span>
  <span class="spark s3">✧</span><span class="spark s4">✦</span>
  <div id="marquee">
    <span class="bulbs"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span>
    <div id="kanji">漫画マシン</div>
    <div id="sub">THE MANGA MACHINE</div>
  </div>

  <div id="bezel">
    <div id="screen">
      <div class="lyr on" id="l-still"><img src="still.jpg" alt="NEON GRAFFITI GIRL — porcelain" /></div>
      <div class="lyr" id="l-video"><video id="vid" playsinline preload="auto"></video></div>
      <div class="lyr" id="l-flip"><img id="flipimg" alt="" /></div>
      <div id="l-print"><img src="manga.jpg" alt="NEON GRAFFITI GIRL — manga" /></div>
      <div id="edge"></div>
      <div id="flash"></div>
      <div id="scan"></div><div id="glare"></div><div id="vig"></div>
      <div id="cap"><span id="capk">磁器</span><span id="cape">PORCELAIN ANDROID</span></div>
      <div id="neon">NEON GRAFFITI GIRL</div>
    </div>
  </div>

  <div id="rewards">
    <div class="rw">
      <div class="rw-img"><img src="still.jpg" alt="Porcelain" /></div>
      <span class="rw-k" style="color:#ff2d78">磁器</span><span class="rw-e">PORCELAIN</span>
    </div>
    <div class="rw">
      <div class="rw-img"><img src="manga.jpg" alt="Manga" /></div>
      <span class="rw-k" style="color:#00d4ff">漫画</span><span class="rw-e">MANGA</span>
    </div>
    <div class="rw">
      <div class="rw-img"><img id="rwimg" alt="Transformation" /></div>
      <span class="rw-k" style="color:#39ff14">変換</span><span class="rw-e">TRANSFORMATION</span>
    </div>
  </div>

  <div id="status"><span id="led"></span><span id="stext">磁器 · PORCELAIN</span><span style="width:8px"></span></div>

  <div id="plate"><div id="pname">NEON GRAFFITI GIRL</div><div id="partist">MISS AL SIMPSON</div></div>

  <div id="deck">
    <button id="lever">
      <span id="track"><span id="knob"></span><span id="tglow"></span></span>
      <span id="ltxt"><span id="lk">変換</span><span id="le">PULL THE LEVER</span></span>
    </button>
    <button id="snd" title="Sound">♫</button>
  </div>

  <div id="base">
    <span id="grille"><i></i><i></i><i></i><i></i><i></i><i></i></span>
    <span id="edn">LIMITED EDITION</span>
    <span id="coin"></span>
  </div>
  <div id="feet"><i></i><i></i></div>
</div>

<script>
(function(){
  var body=document.body,
      still=document.getElementById('l-still'), lvid=document.getElementById('l-video'),
      print=document.getElementById('l-print'), edge=document.getElementById('edge'),
      flash=document.getElementById('flash'), vid=document.getElementById('vid'),
      rewards=document.getElementById('rewards'),
      lever=document.getElementById('lever'), knob=document.getElementById('knob'),
      lk=document.getElementById('lk'), le=document.getElementById('le'),
      stext=document.getElementById('stext'),
      capk=document.getElementById('capk'), cape=document.getElementById('cape'),
      neon=document.getElementById('neon'), snd=document.getElementById('snd'),
      lflip=document.getElementById('l-flip'), flipimg=document.getElementById('flipimg'),
      rwimg=document.getElementById('rwimg');

  var soundOn=true, state='porcelain', timers=[];
  function clear(){timers.forEach(clearTimeout);timers=[]}
  function later(fn,ms){timers.push(setTimeout(fn,ms))}
  function cap(k,e){capk.textContent=k;cape.textContent=e}
  function show(el){[still,lvid,lflip].forEach(function(f){f.classList.toggle('on',f===el)})}

  function toPorcelain(){
    clear();stopFlip();stopReward();stopFallbackAudio();state='porcelain';body.dataset.state=state;
    vid.pause();vid.currentTime=0;
    print.classList.remove('on','go');edge.classList.remove('go');flash.classList.remove('go');
    rewards.classList.remove('on');neon.classList.remove('on');
    show(still);cap('磁器','PORCELAIN ANDROID');
    stext.textContent='磁器 · PORCELAIN';
    lk.textContent='変換';le.textContent='PULL THE LEVER';
    lever.disabled=false;knob.classList.remove('down');
  }

  // the full site sequence: 起動 -> 処理中 -> 変換中 -> flash -> printout -> the three
  function pull(){
    clear();lever.disabled=true;knob.classList.add('down');
    state='pulling';body.dataset.state=state;
    cap('起動','READING MEMORY');stext.textContent='起動 · READING MEMORY';
    neon.classList.add('on');
    later(function(){
      state='loading';body.dataset.state=state;
      cap('処理中','PROCESSING');stext.textContent='処理中 · PROCESSING';
    },1200);
    later(transform,3400);
  }

  var flipTimer=null, rwTimer=null, audio=null;
  function stopFlip(){ if(flipTimer){clearTimeout(flipTimer);clearInterval(flipTimer);flipTimer=null;} }
  function stopReward(){ if(rwTimer){clearInterval(rwTimer);rwTimer=null;} }

  // The 変換 card loops the same frames, so it shows the transformation even
  // where video is blocked.
  function startRewardLoop(){
    if(!rwimg||!window.__ANIM) return;
    rwimg.src=window.__ANIM;   // animated webp loops on its own
  }

  // Music without a media element. Objkt's iframe blocks <video> AND <audio>,
  // so try the Web Audio API too — it's a different API and the lever click
  // supplies the user gesture it needs. Silent if that's blocked as well;
  // it never blocks the transformation.
  var actx=null, abuf=null, asrc=null;
  function playFallbackAudio(){
    if(!window.__AUDIO||!soundOn) return;
    try{
      if(!audio){ audio=new Audio(window.__AUDIO); audio.preload='auto'; }
      audio.currentTime=0; audio.volume=1;
      var pr=audio.play();
      if(pr&&pr.catch) pr.catch(webAudioPlay);   // element blocked -> Web Audio
    }catch(e){ webAudioPlay(); }
  }
  function webAudioPlay(){
    try{
      var AC=window.AudioContext||window.webkitAudioContext;
      if(!AC) return;
      if(!actx) actx=new AC();
      if(actx.state==='suspended'){ try{actx.resume()}catch(e){} }
      if(abuf){ startBuf(); return; }
      fetch(window.__AUDIO).then(function(r){return r.arrayBuffer()})
        .then(function(b){ return actx.decodeAudioData(b) })
        .then(function(buf){ abuf=buf; startBuf(); })
        .catch(function(){});
    }catch(e){}
  }
  function startBuf(){
    try{
      stopFallbackAudio();
      asrc=actx.createBufferSource(); asrc.buffer=abuf;
      asrc.connect(actx.destination); asrc.start(0);
    }catch(e){}
  }
  function stopFallbackAudio(){
    try{ if(audio){audio.pause();audio.currentTime=0;} }catch(e){}
    try{ if(asrc){asrc.stop(0);asrc.disconnect();asrc=null;} }catch(e){}
  }

  // If the film cannot play (Objkt's artifact iframe blocks <video> however the
  // source is supplied), show an ANIMATED WEBP instead — an image the browser
  // animates natively, so it stays smooth. Images always render there.
  function flipbook(){
    if(!window.__ANIM) return reveal();
    try{vid.pause()}catch(e){}
    stopFlip();
    flipimg.src=window.__ANIM;
    show(lflip);
    playFallbackAudio();
    flipTimer=setTimeout(reveal, window.__ANIM_MS||15000);
  }

  // Objkt's artifact CSP is: media-src *  — any HOST is allowed, but the `*`
  // wildcard does NOT cover data: or blob: schemes. So the film must be loaded
  // over https. Several gateways are tried in turn; if all fail the animated
  // webp takes over, so the transformation always happens.
  function attachFilm(){
    if(vid.dataset.wired) return;
    vid.dataset.wired='1';
    var cid=window.__FILM_CID;
    if(!cid) return;
    vid.preload='auto';
    ['https://ipfs.io/ipfs/','https://dweb.link/ipfs/','https://cloudflare-ipfs.com/ipfs/',
     'https://gateway.pinata.cloud/ipfs/'].forEach(function(g){
      var so=document.createElement('source');
      so.src=g+cid; so.type='video/mp4';
      vid.appendChild(so);
    });
    try{vid.load()}catch(e){}
  }

  var gaveUp=false;
  function startFilm(){
    if(gaveUp||state!=='transforming') return;
    try{ vid.currentTime=0; }catch(e){}
    vid.muted=!soundOn;
    var p=vid.play();
    if(p&&p.catch){p.catch(function(){          // sound refused -> try muted
      vid.muted=true;soundOn=false;snd.textContent='♪';
      vid.play().catch(function(){});
    })}
  }

  function transform(){
    attachFilm();
    gaveUp=false;
    state='transforming';body.dataset.state=state;
    cap('変換中','RECOVERING MEMORY');stext.textContent='変換中 · RECOVERING MEMORY';
    show(lvid);

    // The film streams from an IPFS gateway, so it may need a few seconds.
    // Play as soon as it can, and only fall back if it truly never starts.
    if(vid.readyState>=3) startFilm();
    else { vid.addEventListener('canplay',startFilm,{once:true});
           vid.addEventListener('loadeddata',startFilm,{once:true}); }

    later(function(){
      if(state==='transforming' && !(vid.currentTime>0.15)){ gaveUp=true; flipbook(); }
    }, 9000);
  }

  // the bit she loves: flash, then the manga prints out, then the three appear
  function reveal(){
    clear();stopFlip();state='manga';body.dataset.state=state;
    flash.classList.remove('go');void flash.offsetWidth;flash.classList.add('go');
    print.classList.add('on');void print.offsetWidth;print.classList.add('go');
    edge.classList.remove('go');void edge.offsetWidth;edge.classList.add('go');
    cap('完成','MEMORY RECOVERY SUCCESSFUL');
    stext.textContent='完成 · MEMORY RECOVERY SUCCESSFUL';
    neon.classList.remove('on');void neon.offsetWidth;neon.classList.add('on');
    later(function(){
      rewards.classList.add('on');
      startRewardLoop();
      lk.textContent='もう一度';le.textContent='AGAIN';
      lever.disabled=false;knob.classList.remove('down');
    },2200);
  }

  vid.addEventListener('ended',reveal);
  vid.addEventListener('error',reveal);
  lever.addEventListener('click',function(){
    if(state==='porcelain')pull();else if(state==='manga')toPorcelain();
  });
  snd.addEventListener('click',function(){
    soundOn=!soundOn;vid.muted=!soundOn;snd.textContent=soundOn?'♫':'♪';
  });
  window.addEventListener('keydown',function(e){
    if(e.code==='Space'||e.code==='Enter'){e.preventDefault();lever.click()}
  });

  setTimeout(attachFilm,0);   // __FILM_CID is defined in a later script
  toPorcelain();
})();
</script>
</body>
</html>
