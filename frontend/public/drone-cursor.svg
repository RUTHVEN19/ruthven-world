<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Drone body -->
  <rect x="12" y="13" width="8" height="6" rx="2" fill="#ffffff" opacity="0.9"/>
  <!-- Camera lens -->
  <circle cx="16" cy="16" r="2" fill="#333"/>
  <circle cx="16" cy="16" r="1" fill="#666"/>
  <!-- Arms -->
  <line x1="12" y1="14" x2="5" y2="10" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
  <line x1="20" y1="14" x2="27" y2="10" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
  <line x1="12" y1="18" x2="5" y2="22" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
  <line x1="20" y1="18" x2="27" y2="22" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
  <!-- Propellers -->
  <ellipse cx="5" cy="10" rx="4" ry="1.5" fill="#ffffff" opacity="0.4"/>
  <ellipse cx="27" cy="10" rx="4" ry="1.5" fill="#ffffff" opacity="0.4"/>
  <ellipse cx="5" cy="22" rx="4" ry="1.5" fill="#ffffff" opacity="0.4"/>
  <ellipse cx="27" cy="22" rx="4" ry="1.5" fill="#ffffff" opacity="0.4"/>
  <!-- Propeller centers -->
  <circle cx="5" cy="10" r="1.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="27" cy="10" r="1.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="5" cy="22" r="1.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="27" cy="22" r="1.5" fill="#ffffff" opacity="0.7"/>
</svg>
